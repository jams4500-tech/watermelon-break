<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>수박 깨기 — 어드민</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#F5F5F0;color:#1A1A1A;padding:16px;max-width:760px;margin:0 auto;line-height:1.5}
  h1{font-size:20px;margin-bottom:4px}
  .sub{color:#666;font-size:13px;margin-bottom:16px}
  .gate{background:white;padding:20px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .gate input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px}
  .gate button{margin-top:10px;width:100%;padding:12px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .toolbar button{padding:8px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
  .btn-add{background:#2E7D32;color:white}
  .btn-save{background:#1E88E5;color:white}
  .btn-reset{background:#E8334A;color:white}
  .notice{background:#FFF8E1;border:1px solid #FFC107;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;color:#5D4037}
  .product{background:white;padding:14px;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .product-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .product-idx{font-weight:700;font-size:13px;color:#666}
  .product-stat{font-size:11px;color:#888}
  .product-del{background:#E8334A;color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
  .field{margin-bottom:8px}
  .field label{display:block;font-size:11px;color:#666;margin-bottom:2px;font-weight:600}
  .field input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
  .row{display:flex;gap:8px}
  .row .field{flex:1}
  .thumb-preview{width:72px;height:72px;border-radius:8px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:28px;float:right;margin-left:12px}
  .thumb-preview img{width:100%;height:100%;object-fit:cover}
  .footer-actions{position:sticky;bottom:0;background:#F5F5F0;padding:12px 0;margin-top:16px;display:flex;gap:8px}
  .footer-actions button{flex:1;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700}
  .status{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:white;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
  .status.show{opacity:1}
</style>
</head>
<body>

<h1>🍉 수박 깨기 어드민</h1>
<div class="sub">진짜 수박 사러가기 상품 관리</div>

<div id="gate" class="gate">
  <p style="margin-bottom:10px;font-size:14px">관리자 비밀번호</p>
  <input id="pw" type="password" placeholder="비밀번호" autofocus>
  <button onclick="checkPw()">로그인</button>
</div>

<div id="editor" style="display:none">
  <div class="notice">
    📌 <b>썸네일 규격:</b> 정방형 (1:1), <b>512×512px 이상</b> 권장 (최소 180×180), JPG/PNG/WEBP, 500KB 이하<br>
    이미지는 외부 호스팅(쿠팡 상품 이미지 URL, 임가url, imgur 등) URL을 넣어주세요.
  </div>
  <div class="toolbar">
    <button class="btn-add" onclick="addProduct()">+ 상품 추가</button>
    <button class="btn-save" onclick="saveAll()">💾 저장</button>
    <button class="btn-reset" onclick="resetClicks()">🔄 클릭수 초기화</button>
    <button class="btn-reset" style="background:#888" onclick="restoreDefaults()">↻ 기본 상품 복원</button>
  </div>
  <div id="products"></div>
  <div class="footer-actions">
    <button class="btn-save" onclick="saveAll()">💾 저장하기</button>
  </div>
</div>

<div id="status" class="status"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const ADMIN_PW = 'watermelon2026';
let items = [];
let clicks = {};

// Firestore에 상품 문서가 없을 때 seed로 사용할 기본 목록 (앱의 melonProducts와 동일)
const DEFAULT_PRODUCTS = [
  { id: 'p1',  name: '컷팅 고당도 수박 500g, 1개', thumb: '', price: '14,900', original: '25,000', tags: ['로켓배송', '고당도'], delivery: '내일 새벽 도착', link: 'https://coupa.ng/cmorbH' },
  { id: 'p2',  name: '당도선별 11brix 수박 6kg이상, 1개', thumb: '', price: '19,800', original: '32,000', tags: ['당도보장', '프리미엄'], delivery: '로켓프레시', link: 'https://coupa.ng/cmoswj' },
  { id: 'p3',  name: '매일신선 당도보장 아삭한 꿀 하우스 수박 6kg, 1개', thumb: '', price: '11,900', original: '18,000', tags: ['산지직송', '꿀수박'], delivery: '내일 도착', link: 'https://coupa.ng/cmosyA' },
  { id: 'p4',  name: '블랙망고 수박 6kg 1통', thumb: '', price: '16,500', original: '28,000', tags: ['인기', '고당도'], delivery: '로켓배송', link: 'https://link.coupang.com/DUMMY_LINK_4' },
  { id: 'p5',  name: '고창 명품 수박 8kg 이상', thumb: '', price: '22,900', original: '35,000', tags: ['GAP인증', '대과'], delivery: '산지직송', link: 'https://link.coupang.com/DUMMY_LINK_5' },
  { id: 'p6',  name: '미니 애플수박 1.5~2kg 2통', thumb: '', price: '13,900', original: '20,000', tags: ['미니', '1인가구'], delivery: '내일 새벽 도착', link: 'https://link.coupang.com/DUMMY_LINK_6' },
  { id: 'p7',  name: '당도선별 씨없는 수박 5~6kg', thumb: '', price: '17,500', original: '27,000', tags: ['씨없는', '편의'], delivery: '로켓프레시', link: 'https://link.coupang.com/DUMMY_LINK_7' },
  { id: 'p8',  name: '논산 꿀수박 특대 10kg 이상', thumb: '', price: '26,900', original: '40,000', tags: ['특대과', '파티용'], delivery: '산지직송', link: 'https://link.coupang.com/DUMMY_LINK_8' },
  { id: 'p9',  name: '제주 흑수박 6~7kg 당도보장', thumb: '', price: '21,500', original: '33,000', tags: ['제주산', '당도보장'], delivery: '로켓배송', link: 'https://link.coupang.com/DUMMY_LINK_9' },
  { id: 'p10', name: '반쪽 컷팅 수박 2.5~3kg', thumb: '', price: '8,900', original: '14,000', tags: ['컷팅', '소용량'], delivery: '내일 새벽 도착', link: 'https://link.coupang.com/DUMMY_LINK_10' },
  { id: 'p11', name: '성주 참외농원 꿀수박 7kg', thumb: '', price: '18,900', original: '29,000', tags: ['농장직송', '고당도'], delivery: '산지직송', link: 'https://link.coupang.com/DUMMY_LINK_11' },
  { id: 'p12', name: '프리미엄 수박 선물세트 8kg', thumb: '', price: '29,900', original: '45,000', tags: ['선물용', '포장'], delivery: '로켓배송', link: 'https://link.coupang.com/DUMMY_LINK_12' },
];

firebase.initializeApp({
  apiKey: "AIzaSyDdVfE2nXlPtJv6po6ZNwwNxKuXErwU4QQ",
  authDomain: "watermelon-break.firebaseapp.com",
  projectId: "watermelon-break",
  storageBucket: "watermelon-break.firebasestorage.app",
  messagingSenderId: "608010906382",
  appId: "1:608010906382:web:772ab7b93d6b292328055f"
});
const db = firebase.firestore();

function toast(msg){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

function escapeAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;')}

async function checkPw(){
  if (document.getElementById('pw').value !== ADMIN_PW) {
    toast('비밀번호가 틀렸어요');
    return;
  }
  sessionStorage.setItem('wm-admin-ok', '1');
  await boot();
}

async function boot(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  const [pDoc, cDoc] = await Promise.all([
    db.collection('admin').doc('products').get(),
    db.collection('admin').doc('productClicks').get(),
  ]);
  if (pDoc.exists && Array.isArray(pDoc.data().items) && pDoc.data().items.length) {
    items = pDoc.data().items;
  } else {
    // 첫 진입: 기본 상품 목록을 Firestore에 seed
    items = DEFAULT_PRODUCTS.slice();
    try {
      await db.collection('admin').doc('products').set({ items });
      toast('기본 상품 12개를 불러왔어요');
    } catch(e) { console.warn('seed 실패', e); }
  }
  clicks = (cDoc.exists && cDoc.data().counts) || {};
  render();
}

function render(){
  const c = document.getElementById('products');
  c.innerHTML = items.map((p, i) => `
    <div class="product" data-i="${i}">
      <div class="product-head">
        <span class="product-idx">#${i+1} <span class="product-stat">클릭 ${clicks[p.id]||0}회</span></span>
        <button class="product-del" onclick="delProduct(${i})">삭제</button>
      </div>
      <div style="display:flex;align-items:flex-start">
        <div style="flex:1">
          <div class="field"><label>상품 ID (고유)</label><input data-k="id" value="${escapeAttr(p.id)}"></div>
          <div class="field"><label>썸네일 URL (정방형 512×512 권장)</label><input data-k="thumb" value="${escapeAttr(p.thumb)}" placeholder="https://..."></div>
          <div class="field"><label>상품명</label><input data-k="name" value="${escapeAttr(p.name)}"></div>
        </div>
        <div class="thumb-preview">${p.thumb ? `<img src="${escapeAttr(p.thumb)}">` : '🍉'}</div>
      </div>
      <div class="row">
        <div class="field"><label>할인가 (원)</label><input data-k="price" value="${escapeAttr(p.price)}"></div>
        <div class="field"><label>원가 (원)</label><input data-k="original" value="${escapeAttr(p.original)}"></div>
      </div>
      <div class="field"><label>특징 태그 (쉼표로 구분)</label><input data-k="tags" value="${escapeAttr((p.tags||[]).join(', '))}"></div>
      <div class="row">
        <div class="field"><label>배송 문구</label><input data-k="delivery" value="${escapeAttr(p.delivery)}"></div>
        <div class="field"><label>쿠팡 링크</label><input data-k="link" value="${escapeAttr(p.link)}"></div>
      </div>
    </div>
  `).join('');

  // 썸네일 미리보기 실시간 업데이트
  c.querySelectorAll('input[data-k="thumb"]').forEach(inp => {
    inp.addEventListener('input', (ev) => {
      const preview = ev.target.closest('.product').querySelector('.thumb-preview');
      const v = ev.target.value.trim();
      preview.innerHTML = v ? `<img src="${escapeAttr(v)}">` : '🍉';
    });
  });
}

function collect(){
  const next = [];
  document.querySelectorAll('.product').forEach((el, i) => {
    const p = {};
    el.querySelectorAll('input[data-k]').forEach(inp => {
      p[inp.dataset.k] = inp.value.trim();
    });
    p.tags = (p.tags || '').split(',').map(s => s.trim()).filter(Boolean);
    if (!p.id) p.id = 'p' + Date.now() + '_' + i;
    next.push(p);
  });
  return next;
}

function addProduct(){
  items = collect();
  items.push({
    id: 'p' + Date.now(),
    name: '새 상품', thumb: '', price: '0', original: '0',
    tags: [], delivery: '', link: ''
  });
  render();
}

function delProduct(i){
  items = collect();
  if (!confirm('삭제할까요?')) return;
  items.splice(i, 1);
  render();
}

async function saveAll(){
  items = collect();
  try {
    await db.collection('admin').doc('products').set({ items });
    toast('✅ 저장 완료! 앱에 즉시 반영됩니다.');
  } catch(e) {
    toast('저장 실패: ' + e.message);
  }
}

async function restoreDefaults(){
  if (!confirm('현재 상품 목록을 삭제하고 기본 12개로 되돌릴까요?')) return;
  items = DEFAULT_PRODUCTS.slice();
  try {
    await db.collection('admin').doc('products').set({ items });
    render();
    toast('기본 상품으로 복원했어요');
  } catch(e) { toast('실패: ' + e.message); }
}

async function resetClicks(){
  if (!confirm('모든 클릭 카운트를 0으로 리셋할까요?')) return;
  try {
    await db.collection('admin').doc('productClicks').set({ counts: {} });
    clicks = {};
    render();
    toast('클릭수 초기화 완료');
  } catch(e) { toast('실패: ' + e.message); }
}

// 세션 유지
if (sessionStorage.getItem('wm-admin-ok') === '1') {
  boot();
}
document.getElementById('pw').addEventListener('keydown', (e)=>{ if(e.key==='Enter') checkPw(); });
</script>
</body>
</html>
